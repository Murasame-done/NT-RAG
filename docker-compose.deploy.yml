services:
  mysql:
    image: mysql:8.0
    container_name: ntrag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ntrag_db
      MYSQL_USER: ntrag_user
      MYSQL_PASSWORD: ntrag_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./go-service/migrations/init_ntrag.sql:/docker-entrypoint-initdb.d/init_ntrag.sql:ro
    healthcheck:
      test: ["CMD-SHELL","mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ntrag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  python-ai:
    image: ${PYTHON_AI_IMAGE}
    container_name: ntrag-python-ai
    environment:
      PYTHONUNBUFFERED: "1"
      AI_FIXED_DELAY_SECONDS: "0"
      DISABLE_OTEL_TRACING: "1"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,go-service,mysql,qdrant,python-ai"
      no_proxy: "localhost,127.0.0.1,::1,go-service,mysql,qdrant,python-ai"
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  go-service:
    image: ${GO_SERVICE_IMAGE}
    container_name: ntrag-go-service
    environment:
      DB_DSN: ntrag_user:ntrag_password@tcp(mysql:3306)/ntrag_db?parseTime=true
      PORT: ":8080"
      PYTHON_AI_URL: "http://python-ai:8000"
      AI_TIMEOUT_SECONDS: "2"
      DISABLE_OTEL_TRACING: "1"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,mysql,qdrant,python-ai"
      no_proxy: "localhost,127.0.0.1,::1,mysql,qdrant,python-ai"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      python-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL","wget -qO - http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  mysql_data:
  qdrant_data: