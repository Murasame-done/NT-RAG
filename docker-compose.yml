services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ntrag-nginx
    ports:
      - "8088:8088"
    volumes :
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      go-service:
         condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ntrag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    depends_on:
      go-service:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ntrag-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin123456"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,tempo,grafana,prometheus,loki,promtail,go-service,python-ai,mysql,qdrant"
      no_proxy: "localhost,127.0.0.1,::1,tempo,grafana,prometheus,loki,promtail,go-service,python-ai,mysql,qdrant"
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:3.2.1
    container_name: ntrag-loki
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,loki,promtail,grafana,prometheus,go-service,python-ai,mysql,qdrant"
      no_proxy: "localhost,127.0.0.1,::1,loki,promtail,grafana,prometheus,go-service,python-ai,mysql,qdrant"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    container_name: ntrag-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,loki,promtail,grafana,prometheus,go-service,python-ai,mysql,qdrant"
      no_proxy: "localhost,127.0.0.1,::1,loki,promtail,grafana,prometheus,go-service,python-ai,mysql,qdrant"
    depends_on:
      loki:
        condition: service_started

  tempo:
    image: grafana/tempo:2.10.0
    container_name: ntrag-tempo
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,tempo,grafana,prometheus,loki,promtail,go-service,python-ai,mysql,qdrant"
      no_proxy: "localhost,127.0.0.1,::1,tempo,grafana,prometheus,loki,promtail,go-service,python-ai,mysql,qdrant"
    volumes:
      - ./deploy/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo

  mysql:
    image: mysql:8.0
    container_name: ntrag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ntrag_db
      MYSQL_USER: ntrag_user
      MYSQL_PASSWORD: ntrag_password
    ports: 
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./go-service/migrations/init_ntrag.sql:/docker-entrypoint-initdb.d/init_ntrag.sql:ro
    healthcheck:
      test: ["CMD-SHELL","mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ntrag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  python-ai:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        NO_PROXY: ""
        no_proxy: ""
    container_name: ntrag-python-ai
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_SERVICE_NAME: "python-ai"
      PYTHONUNBUFFERED: "1"
      AI_FIXED_DELAY_SECONDS: "0"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,tempo,go-service,mysql,qdrant,python-ai"
      no_proxy: "localhost,127.0.0.1,::1,tempo,go-service,mysql,qdrant,python-ai"
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  go-service:
    build:
      context: ./go-service
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        NO_PROXY: ""
        no_proxy: ""
    container_name: ntrag-go-service
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_SERVICE_NAME: "go-service"
      DB_DSN: ntrag_user:ntrag_password@tcp(mysql:3306)/ntrag_db?parseTime=true
      PORT: ":8080"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,tempo,mysql,qdrant,python-ai"
      no_proxy: "localhost,127.0.0.1,::1,tempo,mysql,qdrant,python-ai"
      PYTHON_AI_URL: "http://python-ai:8000"
      AI_TIMEOUT_SECONDS: "2"

    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      python-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL","wget -qO - http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  mysql_data:
  qdrant_data:
  grafana_data:
  loki_data:
  tempo_data:
