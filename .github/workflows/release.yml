name: release-images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for go-service
        id: go-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/murasame-done/nt-rag-go-service
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push go-service
        uses: docker/build-push-action@v6
        with:
          context: ./go-service
          file: ./go-service/Dockerfile
          push: true
          tags: ${{ steps.go-meta.outputs.tags }}
          labels: ${{ steps.go-meta.outputs.labels }}

      - name: Extract metadata for python-ai
        id: py-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/murasame-done/nt-rag-python-ai
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push python-ai
        uses: docker/build-push-action@v6
        with:
          context: ./python-ai
          file: ./python-ai/Dockerfile
          push: true
          tags: ${{ steps.py-meta.outputs.tags }}
          labels: ${{ steps.py-meta.outputs.labels }}